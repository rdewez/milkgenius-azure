trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    displayName: Use Node.js 20
    inputs:
      versionSpec: 20.x

  - script: node --check milkgenius-app.js
    displayName: Check milkgenius-app.js syntax

  - script: node --check i18n.js
    displayName: Check i18n.js syntax

  - script: node verify-i18n.js
    displayName: Verify i18n coverage

  - task: AzureStaticWebApp@0
    displayName: Deploy MilkGenius to Azure Static Web Apps
    inputs:
      app_location: /
      output_location: ''
      skip_app_build: true
      azure_static_web_apps_api_token: $(azure_static_web_apps_api_token)
